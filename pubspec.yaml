name: stickit_app
description: App nhắc nhở linh hoạt kiểu sticker (StickIt)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ICON iOS
  cupertino_icons: ^1.0.8

  # ===== DATABASE (SQLite) =====
  sqflite: ^2.3.3
  path_provider: ^2.1.4

  # ===== STATE (dùng sau, không bắt buộc) =====
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

