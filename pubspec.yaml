name: stickit_app
description: App nhắc nhở linh hoạt kiểu sticker (StickIt)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ===== THÔNG BÁO =====
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  permission_handler: ^11.3.0

  # ===== ICON =====
  cupertino_icons: ^1.0.8

  # ===== DATABASE (SQLite) =====
  sqflite: ^2.3.3
  path_provider: ^2.1.4

  # ===== QUẢN LÝ TRẠNG THÁI =====
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  table_calendar: ^3.0.9
  sqflite_common_ffi: ^2.4.0+2
  sqflite_common_ffi_web: ^1.1.1

  # ===== CHỌN ẢNH =====
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ===== TẠO ICON =====
  flutter_launcher_icons: ^0.14.3

# ===== CẤU HÌNH ICON ANDROID =====
flutter_icons:
  android: true
  image_path: assets/icons/base_app_icon.png
  adaptive_icon_foreground: assets/icons/android_foreground.png
  adaptive_icon_background: "#8ED1E8"
  adaptive_icon_monochrome: assets/icons/android_monochrome.png

flutter:
  uses-material-design: true

  # ===== TẢI TẤT CẢ FILE TRONG THƯ MỤC ICONS =====
  assets:
    - assets/icons/
